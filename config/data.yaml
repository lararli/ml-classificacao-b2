# data.yaml - Dataset contract
# Defines source, target and feature columns. All models must respect this contract.

source: "taweilo/loan-approval-classification-data"
file_pattern: "*.csv"
target: "loan_status"

numericas:
  - person_age
  - person_income
  - person_emp_exp
  - loan_amnt
  - loan_int_rate
  - loan_percent_income
  - cb_person_cred_hist_length
  - credit_score

categoricas:
  - person_gender
  - person_education
  - person_home_ownership
  - loan_intent
  - previous_loan_defaults_on_file
