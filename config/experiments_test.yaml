# experiments_test.yaml
# Models under experimentation. Results saved to a separate MLflow experiment.
# Does not impact production.
#
# Two types of models supported:
#   sklearn:  model_class: "sklearn.ensemble.RandomForestClassifier"
#   custom:   model_class: "models.custom_models.RuleBasedClassifier"
#
# Optional: reduction: "pca" or "lda" wraps model in StandardScaler + reduction pipeline

models:
  # ── Baselines ──────────────────────────────────────────

  - name: "SklearnDummy"
    model_class: "sklearn.dummy.DummyClassifier"
    params:
      strategy: "most_frequent"

  - name: "CustomRuleBased"
    model_class: "models.custom_models.RuleBasedClassifier"
    params:
      income_threshold: 0.35
      min_credit_score: 600

  # ── Sklearn models ─────────────────────────────────────

  - name: "SklearnPerceptron"
    model_class: "sklearn.linear_model.Perceptron"
    params:
      max_iter: 1000
      eta0: 0.1
      random_state: 42

  - name: "SklearnDT_NoRegularization"
    model_class: "sklearn.tree.DecisionTreeClassifier"
    params:
      random_state: 42

  - name: "SklearnDT_Regularized"
    model_class: "sklearn.tree.DecisionTreeClassifier"
    params:
      max_depth: 5
      min_samples_split: 50
      min_samples_leaf: 20
      random_state: 42

  - name: "SklearnDT_Optimized"
    model_class: "sklearn.tree.DecisionTreeClassifier"
    params:
      random_state: 42
    search_params:
      max_depth: [3, 5, 7, 10, 15, null]
      min_samples_split: [2, 10, 20, 50]
      min_samples_leaf: [1, 5, 10, 20]
      criterion: ["gini", "entropy"]

  - name: "SklearnRandomForest"
    model_class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 100
      max_depth: 10
      random_state: 42
      n_jobs: -1

  - name: "SklearnRF_Optimized"
    model_class: "sklearn.ensemble.RandomForestClassifier"
    params:
      random_state: 42
      n_jobs: -1
    search_params:
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, 15, 20, null]
      min_samples_split: [2, 5, 10]
      min_samples_leaf: [1, 2, 4]

  # ── Reduction variants (best model + PCA/LDA) ─────────
  # Applied only to the best model to test if fewer features
  # can achieve similar performance at lower cost.

  - name: "SklearnRF_PCA"
    model_class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 200
      random_state: 42
      n_jobs: -1
    reduction: "pca"

  - name: "SklearnRF_LDA"
    model_class: "sklearn.ensemble.RandomForestClassifier"
    params:
      n_estimators: 200
      random_state: 42
      n_jobs: -1
    reduction: "lda"
